<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AranyaSync Live Map</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
            linear-gradient(to bottom,#050816,#0f172a);

            color:white;

            font-family:'Rajdhani',sans-serif;

            min-height:100vh;

            overflow:hidden;
        }

        .navbar{

            width:100%;

            padding:20px 30px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            background:rgba(15,23,42,0.7);

            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,255,255,0.08);
        }

        .logo{

            font-family:'Orbitron',sans-serif;

            color:cyan;

            font-size:1.4rem;

            letter-spacing:2px;
        }

        .back-btn{

            text-decoration:none;

            color:white;

            padding:10px 18px;

            border-radius:10px;

            background:rgba(0,255,255,0.1);

            transition:0.3s ease;
        }

        .back-btn:hover{

            background:rgba(0,255,255,0.2);
        }

        .map-container{

            height:calc(100vh - 80px);

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;
        }

        .map-box{

            width:100%;

            height:100%;

            border-radius:20px;

            background:
            radial-gradient(circle at top,
            rgba(0,255,255,0.08),
            transparent),

            rgba(15,23,42,0.8);

            border:1px solid rgba(255,255,255,0.08);

            display:flex;

            justify-content:center;

            align-items:center;

            flex-direction:column;

            box-shadow:
            0 0 30px rgba(0,255,255,0.08);
        }

        .map-icon{

            font-size:5rem;

            margin-bottom:20px;
        }

        .map-title{

            font-size:2rem;

            font-family:'Orbitron',sans-serif;

            margin-bottom:10px;

            color:cyan;
        }

        .map-text{

            color:#94a3b8;

            font-size:1.1rem;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <div class="logo">
            ARANYASYNC MAP
        </div>

        <a href="dashboard.html" class="back-btn">
            ← Dashboard
        </a>

    </div>

    <div class="map-container">

        <div class="map-box">

            <div class="map-icon">
                🌍
            </div>

            <div class="map-title">
                LIVE WILDLIFE MAP
            </div>

            <div class="map-text">
                Real-time tracking system initializing...
            </div>

        </div>

    </div>

</body>

</html>
