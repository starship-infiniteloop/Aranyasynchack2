<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AranyaSync | Live GPS Telemetry</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <style>
        .map-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-primary);
        }

        #map {
            flex-grow: 1;
            height: 100%;
            z-index: 1;
        }

        .map-overlay-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: none;
            /* Let clicks pass to map */
        }

        .map-control-card {
            background: rgba(31, 36, 51, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(179, 183, 156, 0.2);
            border-radius: 8px;
            padding: 20px;
            pointer-events: auto;
            /* Re-enable clicks for the panel */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(231, 226, 217, 0.1);
            padding-bottom: 10px;
        }

        .map-header h2 {
            font-size: 1.1rem;
            color: var(--text-light);
            text-shadow: 0 0 5px var(--glow-primary);
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .filter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-switch-small {
            appearance: none;
            width: 36px;
            height: 18px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            outline: none;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            transition: var(--transition-fast);
        }

        .toggle-switch-small::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: var(--transition-fast);
        }

        .toggle-switch-small:checked {
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--glow-primary);
        }

        .toggle-switch-small:checked::after {
            left: 20px;
            background: #fff;
        }

        /* Leaflet Overrides for Dark Theme */
        .leaflet-container {
            background: var(--bg-primary);
        }

        .leaflet-popup-content-wrapper,
        .leaflet-popup-tip {
            background: rgba(52, 60, 74, 0.95);
            color: var(--text-light);
            border: 1px solid var(--accent-primary);
            box-shadow: 0 0 15px var(--glow-primary);
        }

        .leaflet-popup-content {
            font-family: var(--font-body);
        }

        .popup-title {
            font-family: var(--font-heading);
            color: var(--accent-secondary);
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Custom markers pulsing */
        .live-marker {
            background: #2ed573;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7);
            animation: pulse-marker 2s infinite;
        }

        .danger-marker {
            background: #ff4757;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            animation: pulse-danger 1.5s infinite;
        }

        @keyframes pulse-marker {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(46, 213, 115, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(46, 213, 115, 0);
            }
        }

        @keyframes pulse-danger {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            }

            70% {
                transform: scale(1.1);
                box-shadow: 0 0 0 15px rgba(255, 71, 87, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0);
            }
        }

        /* Top right navigation button */
        .nav-back {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div class="map-layout">
        <!-- Floating Panels -->
        <div class="map-overlay-panel">
            <div class="map-control-card">
                <div class="map-header">
                    <h2>RADAR CONTROLS</h2>
                    <span class="status-dot blink" style="box-shadow: 0 0 8px #2ed573; background: #2ed573;"></span>
                </div>
                <div class="filter-list">
                    <div class="filter-item">
                        <span>Vehicles (GPS)</span>
                        <input type="checkbox" id="toggleVehicles" class="toggle-switch-small" checked>
                    </div>
                    <div class="filter-item">
                        <span>Wildlife Trackers</span>
                        <input type="checkbox" id="toggleWildlife" class="toggle-switch-small" checked>
                    </div>
                    <div class="filter-item">
                        <span>Zone Boundaries</span>
                        <input type="checkbox" id="toggleZones" class="toggle-switch-small" checked>
                    </div>
                    <div class="filter-item">
                        <span>SOS Heatmap</span>
                        <input type="checkbox" id="toggleHeatmap" class="toggle-switch-small">
                    </div>
                </div>
            </div>

            <div class="map-control-card">
                <div class="map-header">
                    <h2>SELECTED TARGET</h2>
                </div>
                <div id="targetInfo" style="color: var(--text-muted); font-size: 0.85rem;">
                    No target currently selected.
                </div>
            </div>
        </div>

        <button class="btn-outline nav-back" onclick="window.location.href='dashboard.html'"
            style="width: auto; background: rgba(31,36,51,0.8); backdrop-filter:blur(4px);">
            &lt; RETURN TO COMM
        </button>

        <!-- The Map Container -->
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        // Init map specifically on this page after DOM loads
        document.addEventListener("DOMContentLoaded", initMap);
    </script>
</body>

</html>
