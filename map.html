<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AranyaSync Live Map</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#050816;

            color:white;

            font-family:'Rajdhani',sans-serif;

            overflow:hidden;
        }

        .navbar{

            height:80px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:0 30px;

            background:rgba(15,23,42,0.8);

            backdrop-filter:blur(12px);

            border-bottom:1px solid rgba(255,255,255,0.08);

            position:relative;

            z-index:1000;
        }

        .logo{

            font-family:'Orbitron',sans-serif;

            color:cyan;

            font-size:1.3rem;

            letter-spacing:2px;
        }

        .back-btn{

            text-decoration:none;

            color:white;

            background:rgba(0,255,255,0.1);

            padding:10px 18px;

            border-radius:10px;

            transition:0.3s ease;
        }

        .back-btn:hover{

            background:rgba(0,255,255,0.2);
        }

        #map{

            height:calc(100vh - 80px);

            width:100%;
        }

        .map-overlay{

            position:absolute;

            top:100px;

            left:20px;

            z-index:999;

            background:rgba(15,23,42,0.85);

            padding:18px;

            border-radius:16px;

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            box-shadow:0 0 20px rgba(0,255,255,0.08);
        }

        .map-overlay h2{

            font-family:'Orbitron',sans-serif;

            color:cyan;

            margin-bottom:10px;

            font-size:1rem;
        }

        .map-overlay p{

            color:#94a3b8;

            font-size:0.95rem;

            margin-bottom:6px;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <div class="logo">
            ARANYASYNC LIVE MAP
        </div>

        <a href="dashboard.html" class="back-btn">
            ← Dashboard
        </a>

    </div>

    <div class="map-overlay">

        <h2>TRACKING STATUS</h2>

        <p>🛰 GPS Active</p>

        <p>🚓 Ranger Vehicle Online</p>

        <p>🌍 Wildlife Zone Monitoring Active</p>

    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Initialize Map

        const map = L.map('map').setView([19.0330, 73.0297], 13);

        // OpenStreetMap Tiles

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

            attribution: '&copy; OpenStreetMap contributors'

        }).addTo(map);

        // Example Marker

        const marker = L.marker([19.0330, 73.0297]).addTo(map);

        marker.bindPopup("<b>Wildlife Monitoring Zone</b><br>Ghansoli Sector Area").openPopup();

    </script>

</body>

</html>
