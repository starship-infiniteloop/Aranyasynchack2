<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AranyaSync | System Authorization</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Correct CSS File -->
    

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050816;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top, rgba(0, 255, 255, 0.15), transparent 40%),
                linear-gradient(to bottom, #020617, #0f172a);
        }

        .login-card {
            width: 400px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            color: white;
        }

        .sys-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #00ffff;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            margin: 0;
            color: #00ffff;
            letter-spacing: 2px;
        }

        .subtitle {
            margin-top: 10px;
            margin-bottom: 35px;
            color: #94a3b8;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.2);
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 16px;
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00ffff, #0077ff);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0,255,255,0.4);
        }

        .login-footer {
            margin-top: 25px;
            text-align: center;
            color: #64748b;
            font-size: 12px;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">

        <div class="sys-status">
            <span class="status-dot"></span>
            <span>SYSTEM ONLINE</span>
        </div>

        <h1 class="logo-text">ARANYASYNC</h1>

        <p class="subtitle">
            WILDLIFE & ZONE CONTROL CENTER
        </p>

        <form id="loginForm">

            <div class="input-group">
                <input type="text" placeholder="Operator ID" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Passcode" required>
            </div>

            <button type="submit" class="btn-primary">
                INITIALIZE
            </button>

        </form>

        <div class="login-footer">
            <p>E2E ENCRYPTED // VERS: 4.2.9</p>
        </div>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {

            e.preventDefault();

            const button = document.querySelector(".btn-primary");

            button.innerHTML = "AUTHENTICATING...";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);

        });
    </script>

</body>

</html>
