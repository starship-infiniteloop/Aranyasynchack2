<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AranyaSync | System Authorization</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">
    <div class="cinematic-bg"></div>
    <div class="login-overlay"></div>

    <div class="login-container">
        <div class="login-card glow-panel">
            <div class="sys-status">
                <span class="status-dot blink"></span>
                <span>SYSTEM ONLINE</span>
            </div>

            <h1 class="logo-text">ARANYASYNC</h1>
            <p class="subtitle">WILDLIFE & ZONE CONTROL CENTER</p>

            <form id="loginForm" class="login-form" action="dashboard.html" method="GET">
                <div class="input-group">
                    <input type="text" id="username" required autocomplete="off" placeholder=" ">
                    <label for="username">OPERATOR ID</label>
                    <span class="input-focus-border"></span>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">PASSCODE</label>
                    <span class="input-focus-border"></span>
                </div>
                <button type="submit" class="btn-primary login-btn">
                    <span>INITIALIZE</span>
                </button>
            </form>

            <div class="login-footer">
                <p>E2E ENCRYPTED // VERS: 4.2.9</p>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="js/app.js"></script>
    <script>
        // Simple login transition effect
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<span>AUTHENTICATING...</span>';
            btn.classList.add('loading');

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        });
    </script>
</body>

</html>
