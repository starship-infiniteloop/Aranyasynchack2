<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AranyaSync Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Correct CSS -->
    <link rel="stylesheet" href="dashboard.css">

</head>

<body>

    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar glass-panel">

            <div class="sidebar-brand">

                <h2 class="logo-text-small">
                    ARANYASYNC
                </h2>

            </div>

            <nav class="nav-menu">

    <a href="dashboard.html" class="nav-item active">
        🛰 Dashboard
    </a>

    <a href="map.html" class="nav-item">
        🌍 Live Map
    </a>

    <div class="nav-item">
        📊 Analytics
    </div>

    <div class="nav-item">
        🎟 Booking Slots
    </div>

    <div class="nav-item">
        🚓 Vehicles
    </div>

    <div class="nav-item">
        🦁 Wildlife Logs
    </div>

    <div class="nav-item">
        ⚠ Alerts
    </div>

</nav>

            <div class="sidebar-footer">

                <button class="btn-outline">
                    LOGOUT
                </button>

            </div>

        </aside>

        <!-- MAIN -->
        <main class="main-workspace">

            <!-- NAVBAR -->
            <div class="top-navbar glass-panel">

                <div class="search-bar">
                    <input type="text" placeholder="Search...">
                </div>

                <div class="top-controls">

                    <div class="system-time">
                        00:00:00
                    </div>

                    <div class="user-profile">

                        <div class="avatar">
                            CMD
                        </div>

                        <span>ADMIN OPR</span>

                    </div>

                </div>

            </div>

            <!-- CONTENT -->
            <div class="views-container">

                <section class="view-section active">

                    <h1 class="view-title">
                        SYSTEM OVERVIEW
                    </h1>

                    <div class="stats-grid">

                        <div class="stat-card glow-hover">

                            <div class="stat-icon">
                                🎟
                            </div>

                            <div class="stat-info">

                                <h3>TOTAL BOOKINGS</h3>

                                <div class="stat-value">
                                    1,204
                                </div>

                            </div>

                        </div>

                        <div class="stat-card glow-hover">

                            <div class="stat-icon">
                                🚓
                            </div>

                            <div class="stat-info">

                                <h3>ACTIVE VEHICLES</h3>

                                <div class="stat-value">
                                    34
                                </div>

                            </div>

                        </div>

                        <div class="stat-card glow-hover">

                            <div class="stat-icon">
                                🌍
                            </div>

                            <div class="stat-info">

                                <h3>ACTIVE ZONES</h3>

                                <div class="stat-value">
                                    18
                                </div>

                            </div>

                        </div>

                    </div>

                </section>

            </div>

        </main>

    </div>

</body>

</html>
